<!DOCTYPE html>
<!-- CDP Estado del Jugador — v1.1 — 2026-04-10 09:40 ARG (+ soporte IC múltiples equipos) -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi Estado | Club de Profesionales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul: #2855A4;
      --verde: #2E8B4A;
      --rojo: #dc2626;
      --amarillo: #f59e0b;
      --gris0: #f8f9fa;
      --gris1: #e9ecef;
      --gris2: #adb5bd;
      --gris3: #6c757d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2855A4 50%, #2E8B4A 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .header {
      text-align: center;
      padding: 30px 0 20px;
    }
    .header h1 {
      color: white;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .header p {
      color: rgba(255,255,255,0.85);
      font-size: 1.1rem;
      font-weight: 500;
    }
    .player-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--azul);
      text-align: center;
    }
    .player-info {
      font-size: 0.85rem;
      color: var(--gris3);
      margin-bottom: 16px;
    }
    .player-info span {
      display: inline-block;
      margin-right: 12px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }
    .status-badge.habilitado {
      background: #dcfce7;
      color: #15803d;
    }
    .status-badge.inhabilitado {
      background: #fee2e2;
      color: #b91c1c;
    }
    .status-detail {
      font-size: 0.8rem;
      color: var(--gris3);
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--gris3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pagos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .pago-item {
      text-align: center;
      padding: 10px 6px;
      border-radius: 8px;
      background: var(--gris0);
    }
    .pago-item.aprobado { background: #dcfce7; }
    .pago-item.pendiente { background: #fef9c3; }
    .pago-item.rechazado { background: #fee2e2; }
    .pago-mes {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--gris3);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .pago-estado {
      font-size: 0.75rem;
      font-weight: 600;
    }
    .pago-item.aprobado .pago-estado { color: #15803d; }
    .pago-item.pendiente .pago-estado { color: #b45309; }
    .pago-item.rechazado .pago-estado { color: #b91c1c; }
    .pago-item .pago-estado { color: var(--gris2); }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--gris1);
      font-size: 0.9rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--gris3); }
    .info-value { font-weight: 500; color: #1a1a1a; }
    .salud-card {
      background: linear-gradient(135deg, #fee2e2 0%, #fef2f2 100%);
      border: 1px solid #fecaca;
    }
    .salud-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .salud-icon {
      width: 28px;
      height: 28px;
      background: #dc2626;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }
    .salud-title {
      font-size: 1rem;
      font-weight: 600;
      color: #b91c1c;
    }
    .salud-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .salud-item {
      background: white;
      padding: 10px;
      border-radius: 8px;
    }
    .salud-item.full { grid-column: span 2; }
    .salud-item-label {
      font-size: 0.7rem;
      color: var(--gris3);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .salud-item-value {
      font-size: 0.9rem;
      font-weight: 500;
      color: #1a1a1a;
    }
    .empty-salud {
      text-align: center;
      padding: 20px;
      color: var(--gris3);
    }
    .empty-salud-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: white;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      text-align: center;
      padding: 40px 20px;
    }
    .error-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .error h2 {
      color: var(--azul);
      margin-bottom: 8px;
    }
    .error p {
      color: var(--gris3);
      font-size: 0.9rem;
    }
    .footer {
      text-align: center;
      padding: 16px;
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
    }
    .sancion-badge {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
    }
    .sancion-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #92400e;
      margin-bottom: 4px;
    }
    .sancion-detail {
      font-size: 0.8rem;
      color: #a16207;
    }
    .ultima-carga {
      font-size: 0.75rem;
      color: var(--gris2);
      text-align: right;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Club de Profesionales</h1>
      <p>Justo José de Urquiza</p>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Cargando tu estado...</p>
      </div>
    </div>

    <div class="footer">
      Torneo 2026 — Concepción del Uruguay
    </div>
  </div>

  <script>
    const CONFIG = {
      SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwAr254Oem8RMTZcscDBRAhULTnrimG1o-LGyF2_iYKON-3e5zElJsNKpKLFoC9yY_2/exec'
    };

    const MESES_CORTO = {
      'Enero': 'ENE', 'Febrero': 'FEB', 'Marzo': 'MAR', 'Abril': 'ABR',
      'Mayo': 'MAY', 'Junio': 'JUN', 'Julio': 'JUL', 'Agosto': 'AGO',
      'Septiembre': 'SEP', 'Octubre': 'OCT', 'Noviembre': 'NOV', 'Diciembre': 'DIC'
    };

    async function cargarEstado() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('t') || params.get('token');

      if (!token) {
        mostrarError('Token no encontrado', 'Escaneá el QR de tu carnet para ver tu estado.');
        return;
      }

      try {
        const url = `${CONFIG.SCRIPT_URL}?accion=getEstadoJugador&t=${encodeURIComponent(token)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (!data.ok) {
          mostrarError('Enlace inválido', data.msg || 'El enlace no es válido o expiró.');
          return;
        }

        renderEstado(data);
      } catch (e) {
        mostrarError('Error de conexión', 'No pudimos cargar tu estado. Intentá de nuevo.');
      }
    }

    function mostrarError(titulo, mensaje) {
      document.getElementById('content').innerHTML = `
        <div class="card error">
          <div class="error-icon">⚠️</div>
          <h2>${titulo}</h2>
          <p>${mensaje}</p>
        </div>
      `;
    }

    function renderEstado(data) {
      const { jugador, equiposData, estudioMedico, sancion, fichaSalud } = data;

      // Calcular edad
      let edadHtml = '';
      if (jugador.fechaNac) {
        const partes = jugador.fechaNac.split('/');
        if (partes.length === 3) {
          const fechaNac = new Date(partes[2], partes[1] - 1, partes[0]);
          const hoy = new Date();
          let edad = hoy.getFullYear() - fechaNac.getFullYear();
          const m = hoy.getMonth() - fechaNac.getMonth();
          if (m < 0 || (m === 0 && hoy.getDate() < fechaNac.getDate())) {
            edad--;
          }
          edadHtml = `${edad} años`;
        }
      }

      // Sanción global
      let sancionHtml = '';
      if (sancion) {
        sancionHtml = `
          <div class="sancion-badge">
            <div class="sancion-title">🚫 Sanción deportiva</div>
            <div class="sancion-detail">${sancion.partidos || ''} ${sancion.fechaHab ? '· Habilitado desde: ' + sancion.fechaHab : ''}</div>
          </div>
        `;
      }

      // Generar cards por equipo
      let equiposHtml = '';
      equiposData.forEach((eq, idx) => {
        const esHabilitado = eq.habilitacion.estado === 'Habilitado';
        const statusClass = esHabilitado ? 'habilitado' : 'inhabilitado';
        const statusIcon = esHabilitado ? '✓' : '✗';

        // Pagos de este equipo
        let pagosHtml = '';
        Object.keys(eq.pagos).forEach(mes => {
          const estado = eq.pagos[mes];
          let clase = '';
          let texto = '—';
          if (estado === 'Aprobado') { clase = 'aprobado'; texto = '✓'; }
          else if (estado === 'Pendiente') { clase = 'pendiente'; texto = '⏳'; }
          else if (estado === 'Rechazado') { clase = 'rechazado'; texto = '✗'; }
          pagosHtml += `
            <div class="pago-item ${clase}">
              <div class="pago-mes">${MESES_CORTO[mes] || mes}</div>
              <div class="pago-estado">${texto}</div>
            </div>
          `;
        });

        // Última carga
        let ultimaCargaHtml = '';
        if (eq.ultimaCarga) {
          const fecha = new Date(eq.ultimaCarga);
          ultimaCargaHtml = `<div class="ultima-carga">Última carga: ${fecha.toLocaleDateString('es-AR')}</div>`;
        }

        equiposHtml += `
          <div class="card" style="border-left: 4px solid ${esHabilitado ? 'var(--verde)' : 'var(--rojo)'};">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
              <div>
                <div style="font-weight:600;color:var(--azul);">${eq.equipo.nombre}</div>
                <div style="font-size:0.8rem;color:var(--gris3);">${eq.equipo.categoria}</div>
              </div>
              <div class="status-badge ${statusClass}" style="margin:0;">
                <span>${statusIcon}</span>
                <span>${eq.habilitacion.estado}</span>
              </div>
            </div>
            ${eq.habilitacion.detalle ? `<div class="status-detail" style="margin-bottom:12px;">${eq.habilitacion.detalle}</div>` : ''}
            
            <div class="section-title">💰 Pagos de cuota</div>
            <div class="pagos-grid">
              ${pagosHtml}
            </div>
            ${ultimaCargaHtml}
          </div>
        `;
      });

      // Estudio médico
      let estudioHtml = '';
      if (estudioMedico) {
        const estadoEM = estudioMedico.estado || 'Sin presentar';
        estudioHtml = `
          <div class="info-row">
            <span class="info-label">Estado</span>
            <span class="info-value">${estadoEM}</span>
          </div>
        `;
        if (estudioMedico.fechaVencimiento) {
          estudioHtml += `
            <div class="info-row">
              <span class="info-label">Vencimiento</span>
              <span class="info-value">${estudioMedico.fechaVencimiento}</span>
            </div>
          `;
        }
      } else {
        estudioHtml = `
          <div class="info-row">
            <span class="info-label">Estado</span>
            <span class="info-value" style="color:var(--gris2)">Sin presentar</span>
          </div>
        `;
      }

      // Ficha de salud
      let saludHtml = '';
      if (fichaSalud && (fichaSalud.grupoSanguineo || fichaSalud.contactoNombre)) {
        saludHtml = `
          <div class="card salud-card">
            <div class="salud-header">
              <div class="salud-icon">+</div>
              <div class="salud-title">Ficha de salud</div>
            </div>
            <div class="salud-grid">
              <div class="salud-item">
                <div class="salud-item-label">Grupo sanguíneo</div>
                <div class="salud-item-value">${fichaSalud.grupoSanguineo || '—'}</div>
              </div>
              <div class="salud-item">
                <div class="salud-item-label">Obra social</div>
                <div class="salud-item-value">${fichaSalud.obraSocial || '—'}</div>
              </div>
              ${fichaSalud.condicionesMedicas ? `
              <div class="salud-item full">
                <div class="salud-item-label">Condiciones médicas</div>
                <div class="salud-item-value">${fichaSalud.condicionesMedicas}</div>
              </div>
              ` : ''}
              ${fichaSalud.medicacion ? `
              <div class="salud-item full">
                <div class="salud-item-label">Medicación</div>
                <div class="salud-item-value">${fichaSalud.medicacion}</div>
              </div>
              ` : ''}
              <div class="salud-item full">
                <div class="salud-item-label">Contacto de emergencia</div>
                <div class="salud-item-value">${fichaSalud.contactoNombre || '—'} ${fichaSalud.contactoTel ? '— ' + fichaSalud.contactoTel : ''}</div>
              </div>
            </div>
          </div>
        `;
      } else {
        saludHtml = `
          <div class="card salud-card">
            <div class="salud-header">
              <div class="salud-icon">+</div>
              <div class="salud-title">Ficha de salud</div>
            </div>
            <div class="empty-salud">
              <div class="empty-salud-icon">📋</div>
              <p>No completaste tu ficha de salud.<br>Pedile a tu delegado que la cargue.</p>
            </div>
          </div>
        `;
      }

      // Render completo
      document.getElementById('content').innerHTML = `
        <div class="card" style="text-align:center;">
          <div class="player-name">${jugador.nombre}</div>
          <div style="display:flex;flex-direction:column;gap:4px;margin-top:12px;color:var(--gris3);font-size:0.9rem;">
            <div><span style="color:var(--gris2);">DNI</span> <span style="font-weight:500;color:#1a1a1a;">${jugador.dni || '—'}</span></div>
            ${jugador.fechaNac ? `<div><span style="color:var(--gris2);">Nacimiento</span> <span style="font-weight:500;color:#1a1a1a;">${jugador.fechaNac}</span> ${edadHtml ? `<span style="color:var(--gris2);">·</span> <span style="font-weight:500;color:#1a1a1a;">${edadHtml}</span>` : ''}</div>` : ''}
          </div>
          ${sancionHtml}
        </div>

        ${equiposHtml}

        <div class="card">
          <div class="section-title">🏥 Estudio médico</div>
          ${estudioHtml}
        </div>

        ${saludHtml}
      `;
    }

    // Iniciar
    cargarEstado();
  </script>
</body>
</html>
