  <script>
    // Generar manifest dinámico con el token actual en la URL
    (function() {
      const currentUrl = window.location.href;
      const manifest = {
        "name": "CDP - Club de Profesionales",
        "short_name": "CDP",
        "description": "Credencial Digital",
        "start_url": currentUrl,
        "display": "standalone",
        "background_color": "#1e3a5f",
        "theme_color": "#2855A4",
        "icons": [{
          "src": "icon-cdp.png",
          "sizes": "180x180",
          "type": "image/png"
        }]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const manifestUrl = URL.createObjectURL(blob);
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestUrl;
      document.head.appendChild(link);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
  <div class="container">
    <div class="header">
      <h1>Club de Profesionales</h1>
      <p>Justo José de Urquiza</p>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Cargando credencial...</p>
      </div>
    </div>

    <div class="footer">
      Concepción del Uruguay, Entre Ríos
    </div>
  </div>

  <script>
    const CONFIG = {
      SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwAr254Oem8RMTZcscDBRAhULTnrimG1o-LGyF2_iYKON-3e5zElJsNKpKLFoC9yY_2/exec'
    };

    const MESES_CORTO = {
      'Enero': 'ENE', 'Febrero': 'FEB', 'Marzo': 'MAR', 'Abril': 'ABR',
      'Mayo': 'MAY', 'Junio': 'JUN', 'Julio': 'JUL', 'Agosto': 'AGO',
      'Septiembre': 'SEP', 'Octubre': 'OCT', 'Noviembre': 'NOV', 'Diciembre': 'DIC'
    };

    let tokenFromUrl = false; // Flag para saber si vino de URL o localStorage

    async function cargarEstado() {
      const params = new URLSearchParams(window.location.search);
      let token = params.get('t') || params.get('token');

      // Si viene token en URL, guardarlo como backup
      if (token) {
        tokenFromUrl = true;
        try { localStorage.setItem('cdp_token', token); } catch(e) {}
      } else {
        // Intentar recuperar del localStorage
        tokenFromUrl = false;
        try { token = localStorage.getItem('cdp_token'); } catch(e) {}
      }

      if (!token) {
        mostrarError('Token no encontrado', 'Escaneá el QR de tu carnet para ver tu credencial.');
        return;
      }

      try {
        const url = `${CONFIG.SCRIPT_URL}?accion=getEstadoJugador&t=${encodeURIComponent(token)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (!data.ok) {
          try { localStorage.removeItem('cdp_token'); } catch(e) {}
          mostrarError('Credencial no válida', 'Este socio no se encuentra registrado en el sistema.');
          return;
        }

        // Si viene de URL (QR escaneado) → vista badge
        // Si viene de localStorage (ícono inicio) → vista carnet
        if (tokenFromUrl) {
          renderCredencial(data);
        } else {
          renderCarnetFisico(data);
        }
      } catch (e) {
        mostrarError('Error de conexión', 'No pudimos cargar tu credencial. Intentá de nuevo.');
      }
    }

    function mostrarError(titulo, mensaje) {
      document.getElementById('content').innerHTML = `
        <div class="card error">
          <div class="error-icon">⚠️</div>
          <h2>${titulo}</h2>
          <p>${mensaje}</p>
        </div>
      `;
    }

    // Vista tipo carnet físico (cuando abre desde ícono de inicio)
    function renderCarnetFisico(data) {
      const { jugador, equiposData } = data;
      const estado = calcularEstadoGlobal(equiposData);
      
      // Obtener equipos/categorías
      const equiposTexto = equiposData.map(eq => eq.equipo.nombre).join(' · ');
      const categoriasTexto = [...new Set(equiposData.map(eq => eq.equipo.categoria))].join(' · ');

      document.getElementById('content').innerHTML = `
        <div class="credencial-card carnet-fisico">
          <img src="icon-cdp.png" alt="CDP" class="carnet-logo">
          
          <div class="carnet-nombre">${jugador.nombre}</div>
          <div class="carnet-dni">DNI ${jugador.dni || '—'}</div>
          
          <div class="carnet-equipos">${equiposTexto}</div>
          <div class="carnet-categoria">${categoriasTexto}</div>
          
          <div class="carnet-estado ${estado.debeCuotas ? 'debe' : 'ok'}">
            ${estado.debeCuotas ? '⚠️ Debe cuotas' : '✓ Pagos al día'}
          </div>

          <button class="btn-ver-mas" onclick="mostrarDetallesCompletos()">
            <span>Ver detalles</span>
            <span class="arrow">▼</span>
          </button>

          <div class="detalles" id="detalles"></div>
        </div>
      `;

      // Pre-renderizar los detalles
      renderDetallesCarnet(data);
    }

    function mostrarDetallesCompletos() {
      const btn = document.querySelector('.btn-ver-mas');
      const detalles = document.getElementById('detalles');
      const isVisible = detalles.classList.contains('visible');
      
      if (isVisible) {
        detalles.classList.remove('visible');
        btn.classList.remove('expanded');
        btn.querySelector('span').textContent = 'Ver detalles';
      } else {
        detalles.classList.add('visible');
        btn.classList.add('expanded');
        btn.querySelector('span').textContent = 'Ocultar detalles';
      }
    }

    function renderDetallesCarnet(data) {
      const { jugador, equiposData, estudioMedico, sancion, fichaSalud } = data;
      const estado = calcularEstadoGlobal(equiposData);

      // Badge de estado
      const badgeClass = estado.debeCuotas ? 'debe' : 'activo';
      const badgeIcono = '✓';
      const badgeTitulo = 'SOCIO ACTIVO';
      const badgeSubtitulo = estado.debeCuotas ? 'Debe cuotas' : 'Pagos al día';

      let badgeHtml = `
        <div class="badge-grande ${badgeClass}" style="margin-bottom:16px;">
          <div class="badge-icono">${badgeIcono}</div>
          <div class="badge-titulo">${badgeTitulo}</div>
          <div class="badge-subtitulo">${badgeSubtitulo}</div>
        </div>
      `;

      // Edad
      let edadHtml = '';
      if (jugador.fechaNac) {
        const partes = jugador.fechaNac.split('/');
        if (partes.length === 3) {
          const fechaNac = new Date(partes[2], partes[1] - 1, partes[0]);
          const hoy = new Date();
          let edad = hoy.getFullYear() - fechaNac.getFullYear();
          const m = hoy.getMonth() - fechaNac.getMonth();
          if (m < 0 || (m === 0 && hoy.getDate() < fechaNac.getDate())) edad--;
          edadHtml = `(${edad} años)`;
        }
      }

      // Info personal
      let infoHtml = '';
      if (jugador.fechaNac) {
        infoHtml = `
          <div style="background:var(--gris0);border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;font-size:0.9rem;">
            <span style="color:var(--gris3);">Nacimiento</span>
            <span style="font-weight:500;">${jugador.fechaNac} ${edadHtml}</span>
          </div>
        `;
      }

      // Sanción
      let sancionHtml = '';
      if (sancion) {
        sancionHtml = `
          <div class="sancion-badge">
            <div class="sancion-title">🚫 Sanción deportiva</div>
            <div class="sancion-detail">${sancion.partidos || ''} ${sancion.fechaHab ? '· Habilitado desde: ' + sancion.fechaHab : ''}</div>
          </div>
        `;
      }

      // Equipos
      let equiposHtml = '';
      equiposData.forEach(eq => {
        const esHab = eq.habilitacion.estado === 'Habilitado';
        const statusClass = esHab ? 'habilitado' : 'inhabilitado';

        let pagosHtml = '';
        Object.keys(eq.pagos).forEach(mes => {
          const estado = eq.pagos[mes];
          let clase = '', texto = '—';
          if (estado === 'Aprobado') { clase = 'aprobado'; texto = '✓'; }
          else if (estado === 'Pendiente') { clase = 'pendiente'; texto = '⏳'; }
          else if (estado === 'Rechazado') { clase = 'rechazado'; texto = '✗'; }
          pagosHtml += `<div class="pago-item ${clase}"><div class="pago-mes">${MESES_CORTO[mes] || mes}</div><div class="pago-estado">${texto}</div></div>`;
        });

        let ultimaCargaHtml = '';
        if (eq.ultimaCarga) {
          const fecha = new Date(eq.ultimaCarga);
          ultimaCargaHtml = `<div class="ultima-carga">Última carga: ${fecha.toLocaleDateString('es-AR')}</div>`;
        }

        equiposHtml += `
          <div class="equipo-card" style="border-left:4px solid ${esHab ? 'var(--verde)' : 'var(--rojo)'};">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <div>
                <div style="font-weight:600;color:var(--azul);">${eq.equipo.nombre}</div>
                <div style="font-size:0.8rem;color:var(--gris3);">${eq.equipo.categoria}</div>
              </div>
              <div class="status-badge ${statusClass}">${esHab ? '✓' : '✗'} ${eq.habilitacion.estado}</div>
            </div>
            ${eq.habilitacion.detalle ? `<div style="font-size:0.8rem;color:var(--gris3);margin-bottom:10px;">${eq.habilitacion.detalle}</div>` : ''}
            <div class="section-title">💰 Pagos</div>
            <div class="pagos-grid">${pagosHtml}</div>
            ${ultimaCargaHtml}
          </div>
        `;
      });

      // Estudio médico
      let estudioHtml = '';
      const requiereEstudio = data.requiereEstudio !== false;
      
      if (!requiereEstudio) {
        estudioHtml = `
          <div class="info-row">
            <span class="info-label">Estado</span>
            <span class="info-value" style="color:var(--verde);">No requerido</span>
          </div>
          <div style="font-size:0.75rem;color:var(--gris2);margin-top:4px;">Menores de 40 en Libres</div>
        `;
      } else if (estudioMedico) {
        estudioHtml = `
          <div class="info-row">
            <span class="info-label">Estado</span>
            <span class="info-value">${estudioMedico.estado || 'Sin presentar'}</span>
          </div>
        `;
        if (estudioMedico.fechaVencimiento) {
          estudioHtml += `
            <div class="info-row">
              <span class="info-label">Vencimiento</span>
              <span class="info-value">${estudioMedico.fechaVencimiento}</span>
            </div>
          `;
        }
      } else {
        estudioHtml = `
          <div class="info-row">
            <span class="info-label">Estado</span>
            <span class="info-value" style="color:var(--gris2)">Sin presentar</span>
          </div>
        `;
      }

      // Ficha salud
      let saludHtml = '';
      if (fichaSalud && (fichaSalud.grupoSanguineo || fichaSalud.contactoNombre)) {
        saludHtml = `
          <div class="equipo-card salud-card">
            <div class="salud-header">
              <div class="salud-icon">+</div>
              <div class="salud-title">Ficha de salud</div>
            </div>
            <div class="salud-grid">
              <div class="salud-item">
                <div class="salud-item-label">Grupo sanguíneo</div>
                <div class="salud-item-value">${fichaSalud.grupoSanguineo || '—'}</div>
              </div>
              <div class="salud-item">
                <div class="salud-item-label">Obra social</div>
                <div class="salud-item-value">${fichaSalud.obraSocial || '—'}</div>
              </div>
              ${fichaSalud.condicionesMedicas ? `<div class="salud-item full"><div class="salud-item-label">Condiciones médicas</div><div class="salud-item-value">${fichaSalud.condicionesMedicas}</div></div>` : ''}
              ${fichaSalud.medicacion ? `<div class="salud-item full"><div class="salud-item-label">Medicación</div><div class="salud-item-value">${fichaSalud.medicacion}</div></div>` : ''}
              <div class="salud-item full">
                <div class="salud-item-label">Contacto de emergencia</div>
                <div class="salud-item-value">${fichaSalud.contactoNombre || '—'} ${fichaSalud.contactoTel ? '— ' + fichaSalud.contactoTel : ''}</div>
              </div>
            </div>
          </div>
        `;
      } else {
        saludHtml = `
          <div class="equipo-card salud-card">
            <div class="salud-header">
              <div class="salud-icon">+</div>
              <div class="salud-title">Ficha de salud</div>
            </div>
            <div class="empty-salud">
              <p>Sin datos cargados.<br>Pedile a tu delegado que la complete.</p>
            </div>
          </div>
        `;
      }

      document.getElementById('detalles').innerHTML = `
        ${badgeHtml}
        ${infoHtml}
        ${sancionHtml}
        ${equiposHtml}
        <div class="equipo-card">
          <div class="section-title">🏥 Estudio médico</div>
          ${estudioHtml}
        </div>
        ${saludHtml}
      `;
    }

    function calcularEstadoGlobal(equiposData) {
      let todosHabilitados = true;
      let algunDebeCuotas = false;

      equiposData.forEach(eq => {
        if (eq.habilitacion.estado !== 'Habilitado') {
          todosHabilitados = false;
        }
        // Verificar si hay pagos pendientes o rechazados
        Object.values(eq.pagos).forEach(estado => {
          if (estado === 'Pendiente' || estado === 'Rechazado' || estado === '') {
            algunDebeCuotas = true;
          }
        });
      });

      return { activo: todosHabilitados, debeCuotas: algunDebeCuotas };
    }

    function renderCredencial(data) {
      const { jugador, equiposData } = data;
      const estado = calcularEstadoGlobal(equiposData);

      // Siempre SOCIO ACTIVO, el subtítulo indica si debe o no
      const badgeClass = estado.debeCuotas ? 'debe' : 'activo';
      const badgeIcono = '✓';
      const badgeTitulo = 'SOCIO ACTIVO';
      const badgeSubtitulo = estado.debeCuotas ? 'Debe cuotas' : 'Pagos al día';

      document.getElementById('content').innerHTML = `
        <div class="credencial-card">
          <div class="credencial-nombre">${jugador.nombre}</div>
          <div class="credencial-dni">DNI <strong>${jugador.dni || '—'}</strong></div>
          
          <div class="badge-grande ${badgeClass}">
            <div class="badge-icono">${badgeIcono}</div>
            <div class="badge-titulo">${badgeTitulo}</div>
            <div class="badge-subtitulo">${badgeSubtitulo}</div>
          </div>

          <button class="btn-ver-mas" onclick="toggleDetalles(this)">
            <span>Ver detalles</span>
            <span class="arrow">▼</span>
          </button>

          <div class="detalles" id="detalles"></div>
        </div>
      `;

      renderDetalles(data);
    }

    function toggleDetalles(btn) {
      const detalles = document.getElementById('detalles');
      const isVisible = detalles.classList.contains('visible');
      
      if (isVisible) {
        detalles.classList.remove('visible');
        btn.classList.remove('expanded');
        btn.querySelector('span').textContent = 'Ver detalles';
      } else {
        detalles.classList.add('visible');
        btn.classList.add('expanded');
        btn.querySelector('span').textContent = 'Ocultar detalles';
      }
    }

    function renderDetalles(data) {
      const { jugador, equiposData, estudioMedico, sancion, fichaSalud } = data;

      // Edad
      let edadHtml = '';
      if (jugador.fechaNac) {
        const partes = jugador.fechaNac.split('/');
        if (partes.length === 3) {
          const fechaNac = new Date(partes[2], partes[1] - 1, partes[0]);
          const hoy = new Date();
          let edad = hoy.getFullYear() - fechaNac.getFullYear();
          const m = hoy.getMonth() - fechaNac.getMonth();
          if (m < 0 || (m === 0 && hoy.getDate() < fechaNac.getDate())) edad--;
          edadHtml = `(${edad} años)`;
        }
      }

      // Info personal
      let infoHtml = '';
      if (jugador.fechaNac) {
        infoHtml = `
          <div style="background:var(--gris0);border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;font-size:0.9rem;">
            <span style="color:var(--gris3);">Nacimiento</span>
            <span style="font-weight:500;">${jugador.fechaNac} ${edadHtml}</span>
          </div>
        `;
      }

      // Sanción
      let sancionHtml = '';
      if (sancion) {
        sancionHtml = `
          <div class="sancion-badge">
            <div class="sancion-title">🚫 Sanción deportiva</div>
            <div class="sancion-detail">${sancion.partidos || ''} ${sancion.fechaHab ? '· Habilitado desde: ' + sancion.fechaHab : ''}</div>
          </div>
        `;
      }

      // Equipos
      let equiposHtml = '';
      equiposData.forEach(eq => {
        const esHab = eq.habilitacion.estado === 'Habilitado';
        const statusClass = esHab ? 'habilitado' : 'inhabilitado';

        let pagosHtml = '';
        Object.keys(eq.pagos).forEach(mes => {
          const estado = eq.pagos[mes];
          let clase = '', texto = '—';
          if (estado === 'Aprobado') { clase = 'aprobado'; texto = '✓'; }
          else if (estado === 'Pendiente') { clase = 'pendiente'; texto = '⏳'; }
          else if (estado === 'Rechazado') { clase = 'rechazado'; texto = '✗'; }
          pagosHtml += `<div class="pago-item ${clase}"><div class="pago-mes">${MESES_CORTO[mes] || mes}</div><div class="pago-estado">${texto}</div></div>`;
        });

        let ultimaCargaHtml = '';
        if (eq.ultimaCarga) {
          const fecha = new Date(eq.ultimaCarga);
          ultimaCargaHtml = `<div class="ultima-carga">Última carga: ${fecha.toLocaleDateString('es-AR')}</div>`;
        }

        equiposHtml += `
          <div class="equipo-card" style="border-left:4px solid ${esHab ? 'var(--verde)' : 'var(--rojo)'};">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <div>
                <div style="font-weight:600;color:var(--azul);">${eq.equipo.nombre}</div>
                <div style="font-size:0.8rem;color:var(--gris3);">${eq.equipo.categoria}</div>
              </div>
              <div class="status-badge ${statusClass}">${esHab ? '✓' : '✗'} ${eq.habilitacion.estado}</div>
            </div>
            ${eq.habilitacion.detalle ? `<div style="font-size:0.8rem;color:var(--gris3);margin-bottom:10px;">${eq.habilitacion.detalle}</div>` : ''}
            <div class="section-title">💰 Pagos</div>
            <div class="pagos-grid">${pagosHtml}</div>
            ${ultimaCargaHtml}
          </div>
        `;
      });

      // Estudio médico
      let estudioHtml = '';
      const requiereEstudio = data.requiereEstudio !== false;
      
      if (!requiereEstudio) {
        estudioHtml = `
          <div class="info-row">
            <span class="info-label">Estado</span>
            <span class="info-value" style="color:var(--verde);">No requerido</span>
          </div>
          <div style="font-size:0.75rem;color:var(--gris2);margin-top:4px;">Menores de 40 en Libres</div>
        `;
      } else if (estudioMedico) {
        estudioHtml = `
          <div class="info-row">
            <span class="info-label">Estado</span>
            <span class="info-value">${estudioMedico.estado || 'Sin presentar'}</span>
          </div>
        `;
        if (estudioMedico.fechaVencimiento) {
          estudioHtml += `
            <div class="info-row">
              <span class="info-label">Vencimiento</span>
              <span class="info-value">${estudioMedico.fechaVencimiento}</span>
            </div>
          `;
        }
      } else {
        estudioHtml = `
          <div class="info-row">
            <span class="info-label">Estado</span>
            <span class="info-value" style="color:var(--gris2)">Sin presentar</span>
          </div>
        `;
      }

      // Ficha salud
      let saludHtml = '';
      if (fichaSalud && (fichaSalud.grupoSanguineo || fichaSalud.contactoNombre)) {
        saludHtml = `
          <div class="equipo-card salud-card">
            <div class="salud-header">
              <div class="salud-icon">+</div>
              <div class="salud-title">Ficha de salud</div>
            </div>
            <div class="salud-grid">
              <div class="salud-item">
                <div class="salud-item-label">Grupo sanguíneo</div>
                <div class="salud-item-value">${fichaSalud.grupoSanguineo || '—'}</div>
              </div>
              <div class="salud-item">
                <div class="salud-item-label">Obra social</div>
                <div class="salud-item-value">${fichaSalud.obraSocial || '—'}</div>
              </div>
              ${fichaSalud.condicionesMedicas ? `<div class="salud-item full"><div class="salud-item-label">Condiciones médicas</div><div class="salud-item-value">${fichaSalud.condicionesMedicas}</div></div>` : ''}
              ${fichaSalud.medicacion ? `<div class="salud-item full"><div class="salud-item-label">Medicación</div><div class="salud-item-value">${fichaSalud.medicacion}</div></div>` : ''}
              <div class="salud-item full">
                <div class="salud-item-label">Contacto de emergencia</div>
                <div class="salud-item-value">${fichaSalud.contactoNombre || '—'} ${fichaSalud.contactoTel ? '— ' + fichaSalud.contactoTel : ''}</div>
              </div>
            </div>
          </div>
        `;
      } else {
        saludHtml = `
          <div class="equipo-card salud-card">
            <div class="salud-header">
              <div class="salud-icon">+</div>
              <div class="salud-title">Ficha de salud</div>
            </div>
            <div class="empty-salud">
              <p>Sin datos cargados.<br>Pedile a tu delegado que la complete.</p>
            </div>
          </div>
        `;
      }

      document.getElementById('detalles').innerHTML = `
        ${infoHtml}
        ${sancionHtml}
        ${equiposHtml}
        <div class="equipo-card">
          <div class="section-title">🏥 Estudio médico</div>
          ${estudioHtml}
        </div>
        ${saludHtml}
      `;
    }

    cargarEstado();
  </script>
</body>
</html>
